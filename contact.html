<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Animals from Land, Mountains and the Sea</title>
  <link rel="stylesheet" href="style.css">

  <!-- CONTACT PAGE EXTRA STYLES -->
  <style>
    /* Center and style the form */
    .contact-form {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: none;
    }

    .contact-form button {
      padding: 10px 20px;
      border: none;
      background: purple;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .contact-form button:hover {
      background: #b300b3;
    }

    /* Theme toggle button */
    .theme-toggle {
      margin-left: 15px;
      cursor: pointer;
      font-size: 20px;
      background: none;
      border: none;
      color: inherit;
    }

    /* Purple theme */
    body.purple-theme {
      background-color: #e6d6ff;
      color: black;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">
        <a href="index.html">Animals from Land, Mountains and the Sea</a>
      </div>

      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <!-- THEME TOGGLE BUTTON -->
      <button class="theme-toggle">🌙</button>
    </div>
  </header>

  <main>

    <!-- PAGE TITLE SECTION -->
    <section class="page-title section">
      <div class="container">
        <h1>Contact</h1>
        <p>Have a question or want to reach out? Send a message below.</p>
      </div>
    </section>

    <!-- CONTACT FORM SECTION -->
    <section class="contact-section section">
      <div class="container">
        <form class="contact-form">

          <div class="form-group">
            <label for="name">Name:</label>
            <input id="name" type="text" name="name" placeholder="Your Name">
          </div>

          <div class="form-group">
            <label for="email">Email:</label>
            <input id="email" type="email" name="email" placeholder="Your Email">
          </div>

          <div class="form-group">
            <label for="subject">Subject:</label>
            <input id="subject" type="text" name="subject" placeholder="What's the subject?">
          </div>

          <div class="form-group">
            <label for="message">Message:</label>
            <textarea id="message" name="message" placeholder="Your message"></textarea>
          </div>

          <button type="submit">Submit</button>

        </form>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Animals from Land, Mountains and the Sea. By Mahnoor Fatima All rights reserved.</p>
    </div>
  </footer>

  <!-- THEME TOGGLE SCRIPT -->
  <script>
    const themeToggle = document.querySelector('.theme-toggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('purple-theme');
    });
  </script>

</body>
</html>
